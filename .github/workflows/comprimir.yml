name: Comprimir
on:
  workflow_dispatch:
    inputs:
      sol:
        description: "Selecciona que parte seleccionar"
        required: true
        type: choice
        options:
          - full
          - front
          - back
          - data
jobs:
  punto:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
      - name: fullstack
        if : ${{inputs.sol == 'full' }}
        run: zip -r repo.zip . -x "*.git*"
      - name: front
        if : ${{inputs.sol == 'front' }}
        run: zip -r templates.zip templates/
      - name: back
        if : ${{inputs.sol == 'back' }}
        run: zip -r backend.zip app.py validation.py encriptation.py
      - name: data
        if : ${{inputs.sol == 'data' }}
        run: zip -r data.zip data/
      - name: Subir full
        if: ${{ inputs.sol == 'full' }}
        uses: actions/upload-artifact@v4
        with:
          name: repo
          path: repo.zip

      - name: Subir front
        if: ${{ inputs.sol == 'front' }}
        uses: actions/upload-artifact@v4
        with:
          name: templates
          path: templates.zip

      - name: Subir back
        if: ${{ inputs.sol == 'back' }}
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: backend.zip

      - name: Subir data
        if: ${{ inputs.sol == 'data' }}
        uses: actions/upload-artifact@v4
        with:
          name: data
          path: data.zip
