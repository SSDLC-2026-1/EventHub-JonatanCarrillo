# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  workflow_dispatch:
    inputs:
      sol:
        description: "Selecciona que parte seleccionar"
        required: true
        type: choice
        options:
          - full
          - front
          - back
          - data
jobs:
  punto:
    runs-on: ubuntu-latest
    steps:
      - name: fullstack
        if : ${{inputs.sol == 'full' }}
        run: echo "fullstack"
      - name: front
        if : ${{inputs.sol == 'front' }}
        run: echo "frontstack"
      - name: back
        if : ${{inputs.sol == 'back' }}
        run: echo "frontstack"
      - name: data
        if : ${{inputs.sol == 'data' }}
        run: echo "frontstack"
